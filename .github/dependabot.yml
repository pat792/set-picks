# Dependabot — weekly npm updates for the SPA and Cloud Functions (#414).
# Grouped PRs reduce noise; triage + first-run runbook: docs/DEPENDABOT_OPERATIONS.md
# PRs target `staging` (repo PR base), not `main`.
#
# Re-enabled 2026-07-05 (Sprint 6 wrap, #504) after v1.18 enablement-wave ops reset.
# Triage: docs/DEPENDABOT_OPERATIONS.md — max 1–2 merges/week; never batch-rebase all PRs.
version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    target-branch: "staging"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - skip-version-bump
    groups:
      root-production:
        dependency-type: production
      root-development:
        dependency-type: development

  - package-ecosystem: npm
    directory: "/functions"
    target-branch: "staging"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - skip-version-bump
    groups:
      functions-production:
        dependency-type: production
      functions-development:
        dependency-type: development

  - package-ecosystem: github-actions
    directory: "/"
    target-branch: "staging"
    schedule:
      interval: monthly
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - skip-version-bump
    groups:
      actions-all:
        patterns: ["*"]
