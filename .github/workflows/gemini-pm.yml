name: AI Product Manager PRD Generator

on:
  issues:
    types: [opened]

jobs:
  generate-prd:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Checkout (automation context doc)
        uses: actions/checkout@v4

      - name: Generate PRD with Gemini
        uses: actions/github-script@v7
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        with:
          script: |
            const fs = require("fs");
            const path = require("path");

            const issueNumber = context.issue.number;

            // Use REST canonical body — webhook payload.body can be missing or stale on some deliveries.
            const { data: issueRecord } = await github.rest.issues.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
            });

            const issueTitle = issueRecord.title;
            const rawBody = issueRecord.body || "";

            const labelNames = (issueRecord.labels || []).map((l) =>
              typeof l === "string" ? l : l.name
            );
            const skipLabels = ["skip-prd", "cursor-authored"];
            if (labelNames.some((n) => skipLabels.includes(n))) {
              console.log(
                "Skipping PRD generation: issue has label skip-prd or cursor-authored"
              );
              return;
            }

            /** Match .cursorrules / docs/GITHUB_AUTOMATION_CONTEXT.md */
            function bodyRequestsSkipPrd(body) {
              if (!body || typeof body !== "string") return false;
              const withoutBom = body.replace(/^\uFEFF/, "");
              if (withoutBom.trimStart().startsWith("[SKIP-PRD]")) return true;
              const lines = withoutBom.split(/\r?\n/);
              for (const line of lines) {
                const t = line.trim();
                if (t === "") continue;
                return t === "[SKIP-PRD]" || t.startsWith("[SKIP-PRD]");
              }
              return false;
            }

            if (bodyRequestsSkipPrd(rawBody)) {
              console.log(
                "Skipping PRD generation: [SKIP-PRD] in body (canonical fetch)"
              );
              return;
            }

            const issueBody =
              rawBody.trim() === "" ? "No additional context provided." : rawBody;

            let automationContext = "";
            try {
              const ctxPath = path.join(
                process.env.GITHUB_WORKSPACE,
                "docs/GITHUB_AUTOMATION_CONTEXT.md"
              );
              automationContext = fs.readFileSync(ctxPath, "utf8");
            } catch (e) {
              console.warn("Could not read docs/GITHUB_AUTOMATION_CONTEXT.md:", e.message);
            }

            const prompt = `You are an expert Technical Product Manager. Convert the following feature idea into a comprehensive Product Requirements Document (PRD) formatted in GitHub-Flavored Markdown.

            REPOSITORY ARCHITECTURE (follow exactly for paths and layers):
            ${automationContext || "(Context file missing — use Firebase + React only; avoid inventing src/components for new feature code.)"}

            ADDITIONAL PRODUCT CONTEXT:
            - Stack: React (Vite), Tailwind, Firebase (Auth, Firestore, App Check), Cloud Functions in functions/.
            - Do not hallucinate databases or non-Firebase backends.
            - Do not suggest unnecessary npm packages when the Firebase SDK or React suffices.

            REQUIREMENTS FOR THE PRD:
            1. The Goal (User Story)
            2. Acceptance Criteria
            3. Technical Implementation (React/Firebase; adhere to the repository architecture above)
            4. Proposed File Changes — use real layers: src/pages/, src/features/<domain>/{api,model,ui}/, src/shared/, src/app/ for dashboard shell, functions/, firestore.rules. Do NOT propose new feature code under a generic src/components/ tree.
            5. Agent Guardrails (what NOT to do, e.g. break Auth, violate import boundaries, wrong file paths)

            Feature Title: ${issueTitle}
            User Input/Context: ${issueBody}`;

            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${process.env.GEMINI_API_KEY}`;

            const response = await fetch(url, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                contents: [{ parts: [{ text: prompt }] }],
              }),
            });

            const data = await response.json();

            if (data.error) {
              console.error("Gemini API Error:", data.error);
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body:
                  "⚠️ **PRD generation failed** (Gemini API error). Check workflow logs. Issue body was left unchanged.\n\n<details><summary>Error hint</summary>\n\n```\n" +
                  JSON.stringify(data.error, null, 2).slice(0, 4000) +
                  "\n```\n\n</details>",
              });
              return;
            }

            const prdContent = data.candidates?.[0]?.content?.parts?.[0]?.text;
            if (!prdContent) {
              console.error("Gemini returned no PRD content");
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body:
                  "⚠️ **PRD generation produced empty output.** Issue body was left unchanged. Check workflow logs.",
              });
              return;
            }

            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body:
                prdContent +
                "\n\n---\n*Generated autonomously by Gemini AI tailored for Setlist Pick 'Em*",
            });
