# Runs fast baseline checks on every PR/push, then conditionally runs
# slower risk-weighted jobs (`rules`, `functions`, `qa-runners`) based on
# changed paths or explicit labels. A nightly schedule runs the full matrix.

name: CI

on:
  push:
    branches: [main, master, staging]
  pull_request:
  schedule:
    - cron: '17 9 * * *'

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      functions: ${{ steps.filter.outputs.functions }}
      rules: ${{ steps.filter.outputs.rules }}
      qa_risk: ${{ steps.filter.outputs.qa_risk }}
    steps:
      - uses: actions/checkout@v4
      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            functions:
              - 'functions/**'
            rules:
              - 'firestore.rules'
              - 'firestore.indexes.json'
              - 'firestore.rules.test.cjs'
              - 'firestore.rules.test.*'
            qa_risk:
              - 'src/app/**'
              - 'src/pages/**'
              - 'src/features/**/model/**'
              - 'src/features/**/api/**'
              - 'src/shared/lib/**'
              - 'src/main.*'
              - 'vite.config.*'
              - 'scripts/qa/**'
              - 'scripts/verify-*.mjs'
              - 'public/sw*.js'

  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Dashboard meta (IA drift check)
        run: npm run verify:dashboard-meta

      - name: Dashboard UI tokens (shell drift check)
        run: npm run verify:dashboard-ui

      - name: Client tests (vitest)
        run: npm test

      - name: Version bumped (SemVer gate)
        if: github.base_ref != 'main' && !contains(github.event.pull_request.labels.*.name, 'skip-version-bump')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Use the Releases API — reliable regardless of clone depth or tag fetch limits.
          TAGGED=$(gh api repos/${{ github.repository }}/releases/latest --jq '.tag_name' 2>/dev/null || echo "v0.0.0")
          CURRENT=$(node -p "require('./package.json').version")
          echo "Latest release tag : $TAGGED"
          echo "package.json version: $CURRENT"
          if [ "v$CURRENT" = "$TAGGED" ]; then
            echo "❌ package.json version ($CURRENT) matches the last release tag ($TAGGED)."
            echo "   Bump the version in package.json and add a CHANGELOG.md entry before merging."
            echo "   See docs/API.md §6 for the bump decision table."
            echo "   Add the 'skip-version-bump' label if this PR has no API or feature impact."
            exit 1
          fi
          echo "✓ version $CURRENT is ahead of last release $TAGGED"

  functions:
    needs: changes
    if: github.event_name == 'schedule' || needs.changes.outputs.functions == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: functions
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: functions/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Functions unit tests
        run: npm test

  rules:
    needs: changes
    if: github.event_name == 'schedule' || needs.changes.outputs.rules == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install dependencies
        run: npm ci

      - name: Install Firebase CLI
        run: npm install --no-save --prefix "$RUNNER_TEMP" firebase-tools@15

      - name: Firestore rules emulator tests
        run: "$RUNNER_TEMP/node_modules/.bin/firebase emulators:exec --only firestore --project setlist-pickem-rules-test 'node --test firestore.rules.test.cjs'"

  # Issue #347 — Playwright runners (§A/§B). Risk-gated for PR/push, full on nightly schedule.
  # Requires secrets; skip fork PRs (#349 auth).
  qa-runners:
    runs-on: ubuntu-latest
    needs: [verify, changes]
    if: >
      (github.event_name == 'schedule' ||
      needs.changes.outputs.qa_risk == 'true' ||
      (github.event_name == 'pull_request' &&
      (contains(github.event.pull_request.labels.*.name, 'ci/qa') ||
      contains(github.event.pull_request.labels.*.name, 'ci/full')))) &&
      (github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name == github.repository)
    env:
      QA_PUBLIC_PROFILE_UID: ${{ secrets.QA_PUBLIC_PROFILE_UID }}
      QA_APPCHECK_DEBUG_TOKEN: ${{ secrets.QA_APPCHECK_DEBUG_TOKEN }}
      QA_TEST_EMAIL: ${{ secrets.QA_TEST_EMAIL }}
      QA_TEST_PASSWORD: ${{ secrets.QA_TEST_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      # Browser binaries are large; cache by lockfile so most PRs skip re-download.
      # System deps still run via --with-deps (cheap vs Chromium fetch).
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-browsers-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright Chromium (full, cold cache)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright Chromium (warm cache)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install chromium

      # npm scripts use `--env-file-if-exists=.env.qa.local`; CI has no file unless we
      # write it. Job `env` already exposes secrets to the process, but materializing
      # the file avoids "Continuing without it" noise and matches local workflows.
      - name: Require QA Actions secrets (or skip with clear error)
        run: |
          missing=""
          for v in QA_PUBLIC_PROFILE_UID QA_APPCHECK_DEBUG_TOKEN QA_TEST_EMAIL QA_TEST_PASSWORD; do
            eval "z=\$$v"
            if [ -z "${z:-}" ]; then missing="$missing $v"; fi
          done
          if [ -n "$missing" ]; then
            echo "::error::qa-runners needs Actions secrets (Settings → Secrets and variables → Actions): QA_PUBLIC_PROFILE_UID, QA_APPCHECK_DEBUG_TOKEN, QA_TEST_EMAIL, QA_TEST_PASSWORD. Missing or empty:$missing — see scripts/qa/README.md."
            exit 1
          fi
          printenv | grep -E '^QA_(PUBLIC_PROFILE_UID|APPCHECK_DEBUG_TOKEN|TEST_EMAIL|TEST_PASSWORD)=' > .env.qa.local

      - name: qa:chunks (recipe §A)
        run: npm run qa:chunks

      - name: qa:cache (recipe §B)
        run: npm run qa:cache

  # Issue #348 — §C headers on deployed preview. Optional: set repo Variable QA_PREVIEW_BASE_URL.
  qa-preview-headers:
    runs-on: ubuntu-latest
    needs: verify
    if: ${{ vars.QA_PREVIEW_BASE_URL != '' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) }}
    env:
      QA_PREVIEW_BASE_URL: ${{ vars.QA_PREVIEW_BASE_URL }}
      QA_VERCEL_PROTECTION_BYPASS: ${{ secrets.QA_VERCEL_PROTECTION_BYPASS }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: qa:preview-headers (recipe §C)
        run: node scripts/qa/preview-cache-headers.mjs
